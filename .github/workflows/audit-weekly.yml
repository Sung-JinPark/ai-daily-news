name: Weekly cluster-merge audit

on:
  schedule:
    # Every Monday 03:00 UTC (~= KST 12:00) — after the Sunday KST 18:00
    # pipeline run so the audit sees the freshest data.
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      simulate_anomaly:
        description: "Force anomaly issue creation even without real anomalies (for testing)"
        default: "false"
        required: false

permissions:
  # AUD-025b: the "Commit audit report" step pushes to main, which a
  # read-only token cannot do — weekly report commits were silently
  # failing. issues: write was already present (N5/X4 issues worked).
  contents: write
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run cluster-merge audit
        id: audit
        run: |
          mkdir -p .audit
          REPORT="reviews/cluster-merge-audit-$(date -u +%Y-%m-%d).md"
          python -m pipeline.audit_cluster_merge \
            --out "$REPORT" \
            --anomaly-out .audit/anomalies.json \
            --issue-body-out .audit/issue.md
          echo "report=$REPORT" >> "$GITHUB_OUTPUT"
          N=$(python -c "import json; print(len(json.load(open('.audit/anomalies.json'))))" 2>/dev/null || echo 0)
          echo "n_anomalies=$N" >> "$GITHUB_OUTPUT"
          echo "detected $N anomalies"

      - name: Run source-health audit (X4)
        id: sources
        run: |
          mkdir -p .audit
          python -m pipeline.audit_sources \
            --anomaly-out .audit/sources-anomalies.json \
            --issue-body-out .audit/sources-issue.md
          N=$(python -c "import json; print(len(json.load(open('.audit/sources-anomalies.json'))))" 2>/dev/null || echo 0)
          echo "n_dead=$N" >> "$GITHUB_OUTPUT"
          echo "detected $N dead source(s)"

      - name: Create or update cluster-merge anomaly issue
        if: steps.audit.outputs.n_anomalies != '0' || github.event.inputs.simulate_anomaly == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f .audit/issue.md ]; then
            echo "no issue body produced, skipping"
            exit 0
          fi
          TITLE=$(head -n 1 .audit/issue.md)
          BODY=$(tail -n +3 .audit/issue.md)
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number' || echo "")
          if [ -n "$EXISTING" ]; then
            echo "commenting on existing issue #$EXISTING"
            printf '%s\n\n---\n\n### Weekly re-run: %s\n\n%s\n' \
              "감사 재실행 결과" "$(date -u +%Y-%m-%d)" "$BODY" \
              | gh issue comment "$EXISTING" --body-file -
          else
            echo "creating new issue"
            gh issue create --title "$TITLE" --body "$BODY" --label "audit"
          fi

      - name: Create or update source-health anomaly issue (X4)
        if: steps.sources.outputs.n_dead != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f .audit/sources-issue.md ]; then
            echo "no source-issue body produced, skipping"
            exit 0
          fi
          TITLE=$(head -n 1 .audit/sources-issue.md)
          BODY=$(tail -n +3 .audit/sources-issue.md)
          # Same de-dupe pattern as the cluster-merge branch above.
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number' || echo "")
          if [ -n "$EXISTING" ]; then
            echo "commenting on existing source-health issue #$EXISTING"
            printf '%s\n\n---\n\n### Weekly re-run: %s\n\n%s\n' \
              "소스 헬스 재감사 결과" "$(date -u +%Y-%m-%d)" "$BODY" \
              | gh issue comment "$EXISTING" --body-file -
          else
            echo "creating new source-health issue"
            gh issue create --title "$TITLE" --body "$BODY" --label "source-health"
          fi

      - name: CI health scan (repeated step-reds, E2)
        id: cihealth
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .audit
          python -m pipeline.audit_ci_health --issue-body-out .audit/ci-health-issue.md \
            > .audit/ci-health.json
          N=$(python -c "import json; print(len(json.load(open('.audit/ci-health.json'))['flagged']))" 2>/dev/null || echo 0)
          echo "n_flagged=$N" >> "$GITHUB_OUTPUT"
          echo "flagged $N step(s)"

      - name: Create or update ci-health issue (E2)
        if: steps.cihealth.outputs.n_flagged != '0' || github.event.inputs.simulate_anomaly == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f .audit/ci-health-issue.md ]; then
            echo "no ci-health body produced (simulate without flags), skipping"
            exit 0
          fi
          TITLE=$(head -n 1 .audit/ci-health-issue.md | sed 's/^# //')
          BODY=$(tail -n +3 .audit/ci-health-issue.md)
          EXISTING=$(gh issue list --state open --label "ci-health" --json number --jq '.[0].number' || echo "")
          if [ -n "$EXISTING" ]; then
            echo "commenting on existing ci-health issue #$EXISTING"
            printf 'Weekly re-scan %s\n\n%s\n' "$(date -u +%Y-%m-%d)" "$BODY" \
              | gh issue comment "$EXISTING" --body-file -
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "ci-health"
          fi

      - name: Commit audit report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reviews/ || true
          if ! git diff --cached --quiet; then
            git commit -m "audit: weekly cluster-merge report $(date -u +%Y-%m-%d) [skip ci]"
            for attempt in 1 2 3; do
              if git push; then
                echo "push ok on attempt $attempt"
                exit 0
              fi
              git pull --rebase origin main || true
            done
          fi
