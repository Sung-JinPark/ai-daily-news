name: Daily AI News Pipeline

on:
  schedule:
    # 2x/day. The first run starts at KST 00:00 so the update timestamp
    # rolls past midnight (~01:00 KST finish) — morning visitors see a
    # "today, early morning" stamp instead of "yesterday evening".
    # The second run starts at KST 18:00 for an afternoon refresh.
    # KST 00:00 / 18:00  ==  UTC 15:00 / 09:00
    - cron: "0 15,9 * * *"
  workflow_dispatch:
    inputs:
      cap:
        description: "Daily article cap (LLM safety)"
        default: "120"
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  DAILY_CAP: ${{ github.event.inputs.cap || '120' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore seen cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: seen-v1-${{ github.run_id }}
          restore-keys: |
            seen-v1-

      - name: Collect
        run: python -m pipeline.collect

      - name: Dedupe
        run: python -m pipeline.dedupe

      - name: Summarize (Haiku)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m pipeline.summarize

      - name: Rank
        run: python -m pipeline.rank

      - name: Digest (daily TL;DR)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m pipeline.digest

      - name: Aggregate tags (30-day rolling)
        run: python -m pipeline.aggregate_tags

      - name: Weekly digest (Sunday UTC, self-healing)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DOW=$(date -u +%u)
          WEEK=$(date -u +%G-W%V)
          WEEK_FILE="data/weekly/${WEEK}.json"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] || { [ "$DOW" = "7" ] && [ ! -f "$WEEK_FILE" ]; }; then
            python -m pipeline.weekly
          else
            echo "skipping weekly (DOW=$DOW exists=$([ -f "$WEEK_FILE" ] && echo yes || echo no))"
          fi

      - name: Glossary update (Sunday UTC)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DOW=$(date -u +%u)
          HOUR=$(date -u +%H)
          # First Sunday UTC run only (HOUR=09 = KST 18:00). Skip 15:00 to
          # avoid redundant LLM cost; glossary doesn't need self-healing
          # since terms accumulate.
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] || { [ "$DOW" = "7" ] && [ "$HOUR" = "09" ]; }; then
            python -m pipeline.glossary
          else
            echo "skipping glossary (DOW=$DOW HOUR=$HOUR)"
          fi

      - name: Trending
        run: python -m pipeline.trending

      - name: Entity index (mentions + cooccurrence, no LLM)
        run: python -m pipeline.entity_index

      - name: Embed summaries (Voyage-3, ZE1)
        env:
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: python -m pipeline.embed

      - name: Themes (cross-day narratives)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DOW=$(date -u +%u)
          if [ "$DOW" = "7" ]; then
            python -m pipeline.themes --archive-week
          else
            python -m pipeline.themes
          fi

      - name: Predictions (extract + resolve)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m pipeline.predict_extract

      - name: Quarterly report (first week after quarter end, --auto)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          MONTH=$(date -u +%m)
          DAY=$(date -u +%d)
          # Run only in the first 7 days of Jan/Apr/Jul/Oct so we generate the
          # previous quarter's report once and rely on --auto to skip if it
          # already exists.
          case "$MONTH" in
            01|04|07|10)
              if [ "$DAY" -le 07 ] || [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
                python -m pipeline.quarterly_report --auto
              else
                echo "skipping quarterly (past 7-day window this month)"
              fi
              ;;
            *)
              echo "skipping quarterly (month=$MONTH)"
              ;;
          esac

      - name: Model facts (per-model comparison table)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m pipeline.model_facts

      - name: Latest index
        run: python -m pipeline.index_latest

      - name: Build SQLite research archive
        run: python -m pipeline.build_db

      - name: Upload research archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: archive-db
          path: data/exports/archive.db.gz
          if-no-files-found: warn
          retention-days: 30

      - name: Publish research archive as GitHub Release (Mon UTC)
        if: ${{ github.event_name == 'workflow_dispatch' || (env.DOW_FOR_RELEASE == '' && success()) }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Publish once per ISO week so anonymous downloads have a stable
          # URL. The tag is the ISO week for the current UTC day; if it
          # already exists we upload the .gz to the same release so the
          # link always points to the freshest build of the week.
          DOW=$(date -u +%u)
          if [ "$DOW" != "1" ] && [ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ]; then
            echo "skipping release (DOW=$DOW, only Mon UTC unless dispatched)"
            exit 0
          fi
          if [ ! -f data/exports/archive.db.gz ]; then
            echo "no archive.db.gz to release"
            exit 0
          fi
          WEEK=$(date -u +%G-W%V)
          TAG="archive-${WEEK}"
          TITLE="Research archive · ${WEEK}"
          NOTES="Auto-generated SQLite dump of the current corpus. See /research for schema."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" data/exports/archive.db.gz --clobber
          else
            gh release create "$TAG" data/exports/archive.db.gz \
              --title "$TITLE" --notes "$NOTES" --latest
          fi

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no data changes"
            exit 0
          fi
          git commit -m "data: $(date -u +%Y-%m-%dT%H:%MZ) pipeline run [skip ci]"
          for attempt in 1 2 3; do
            if git push; then
              echo "push ok on attempt $attempt"
              exit 0
            fi
            echo "push rejected, rebasing onto remote (attempt $attempt)"
            git pull --rebase origin main || true
          done
          echo "push failed after 3 attempts" >&2
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package.json

      - name: Install site deps
        working-directory: site
        run: npm install --no-audit --no-fund

      - name: Build site
        working-directory: site
        env:
          PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Report failure as issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Pipeline failed: ${new Date().toISOString()}`;
            const body = `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['pipeline-failure']
            });
