name: Daily AI News Pipeline

on:
  schedule:
    # KST 07:00 / 15:00 / 23:00  ==  UTC 22:00 / 06:00 / 14:00
    - cron: "0 22,6,14 * * *"
  workflow_dispatch:
    inputs:
      cap:
        description: "Daily article cap (LLM safety)"
        default: "100"
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  DAILY_CAP: ${{ github.event.inputs.cap || '100' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore seen cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: seen-v1-${{ github.run_id }}
          restore-keys: |
            seen-v1-

      - name: Collect
        run: python -m pipeline.collect

      - name: Dedupe
        run: python -m pipeline.dedupe

      - name: Summarize (Haiku)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m pipeline.summarize

      - name: Rank
        run: python -m pipeline.rank

      - name: Trending
        run: python -m pipeline.trending

      - name: Latest index
        run: python -m pipeline.index_latest

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no data changes"
          else
            git commit -m "data: $(date -u +%Y-%m-%dT%H:%MZ) pipeline run [skip ci]"
            git push
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package.json

      - name: Install site deps
        working-directory: site
        run: npm install --no-audit --no-fund

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Report failure as issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Pipeline failed: ${new Date().toISOString()}`;
            const body = `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['pipeline-failure']
            });
