name: Research Nightly (private)

# Automates the private research ledger (run-research.bat equivalent) on CI,
# GitHub-only (no external store). State persistence = Actions cache; the
# irreplaceable hand-curated lexicon is bootstrapped from a Secret on a cold
# start / cache eviction, then mentions rebuild from the committed public data.
#
# SAFETY (this is a PUBLIC repo): the private tree is NEVER committed — only the
# sanitized data/research_stats.json is. Concept-level stdout goes to a gitignored
# private log so no concept names/bodies land in the PUBLIC Actions console. A hard
# leak gate fails the run if any private file is tracked. The job is INERT until the
# LEXICON_SEED_B64 secret is set (guard), so merging this file changes nothing.

on:
  schedule:
    - cron: "0 11 * * *"   # UTC 11:00 == KST 20:00 (after the news CI settles)
  workflow_dispatch:

concurrency:
  group: research-nightly
  cancel-in-progress: false

permissions:
  contents: write   # ONLY to commit the sanitized research_stats.json
  issues: write     # failure alert

env:
  CACHE_PREFIX: research-state-v1-

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - name: Guard — inert unless the lexicon seed is configured
        id: guard
        env:
          LEXICON_SEED_B64: ${{ secrets.LEXICON_SEED_B64 }}
        run: |
          if [ -z "$LEXICON_SEED_B64" ]; then
            echo "LEXICON_SEED_B64 not set — research nightly is inert. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        if: steps.guard.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore private state (Actions cache — lightweight ledger only)
        id: restore
        if: steps.guard.outputs.skip != 'true'
        uses: actions/cache/restore@v4
        with:
          # research.db (news-driven ledger) + audits/labels + en_corpus + notes.
          # papers.db is deliberately NOT cached: the 268MB all-arXiv corpus is a
          # separate local research artifact; CI's papers.db is rebuilt today-only
          # from committed news (collect_papers --day).
          path: data/research_private
          key: ${{ env.CACHE_PREFIX }}${{ github.run_id }}
          restore-keys: |
            ${{ env.CACHE_PREFIX }}

      - name: Bootstrap lexicon if cache empty (from Secret)
        if: steps.guard.outputs.skip != 'true'
        env:
          LEXICON_SEED_B64: ${{ secrets.LEXICON_SEED_B64 }}
        run: python -m pipeline.research.lexicon_seed --import-b64

      - name: Run research pipeline (incremental --day on cache hit / --backfill on miss; concept output → private log)
        if: steps.guard.outputs.skip != 'true'
        run: |
          mkdir -p data/research_private/logs
          LOG="data/research_private/logs/ci-$(date -u +%Y%m%dT%H%M%SZ).log"
          echo "run-research (CI) $(date -u)" > "$LOG"
          # newest committed data/<day>/ — the day the news CI just produced.
          DAY="$(ls -d data/2???-??-?? 2>/dev/null | sort | tail -1 | xargs -r basename)"
          echo "target day: $DAY" | tee -a "$LOG"
          step() { name="$1"; shift; echo "::group::$name"; ("$@") >> "$LOG" 2>&1 && echo "$name: ok" || echo "$name: reported errors (non-fatal)"; echo "::endgroup::"; }
          # MODE: cache HIT -> incremental --day; cache MISS (cold start / eviction)
          # -> --backfill to rebuild the FULL daily-parallel corpus (news + the arXiv
          # papers the news referenced) from committed public data. --backfill is
          # LIGHT here — CI collects only news-referenced papers (~hundreds), never
          # the 268MB all-arXiv corpus (that is a frozen local research artifact).
          if [ "${{ steps.restore.outputs.cache-hit }}" = "true" ]; then
            MODE="--day $DAY"; echo "cache hit — incremental $MODE" | tee -a "$LOG"
          else
            MODE="--backfill"; echo "cache MISS — --backfill (full daily-parallel rebuild; no all-arXiv)" | tee -a "$LOG"
          fi
          step health_check   python -m pipeline.research.health_check
          step snapshot       python -m pipeline.research.snapshot
          # news-referenced papers only (--sleep/--limit-enrich = gentle arXiv drain).
          step collect_papers python -m pipeline.collect_papers $MODE --sleep 3 --limit-enrich 50
          step weekly_brief   python -m pipeline.research.weekly_brief
          step lexicon_cands  python -m pipeline.research.lexicon_candidates
          step backfill_bodies python -m pipeline.research.backfill_bodies
          step en_corpus      python -m pipeline.research.en_corpus --backfill
          step concept_extract python -m pipeline.research.concept_extract $MODE
          # concept_lifecycle builds concept_pairs / media_lag / revival_events —
          # tables that export_public_stats.concepts_block() reads. Without it the
          # concepts block errors out to null (light on the news corpus).
          step concept_lifecycle python -m pipeline.research.concept_lifecycle
          step monthly_insight python -m pipeline.research.monthly_insight
          step export_stats   python -m pipeline.research.export_public_stats
          step dashboard      python -m pipeline.research.dashboard
          # Expansion news-density monitor — TRACKING ONLY (no analysis). Updates the
          # private notes/news_density.json (rides this cache; never committed).
          step density_monitor python -m pipeline.research.news_density_monitor

      - name: R5 readiness check + alert decision (SURFACING ONLY — no analysis)
        id: r5
        if: steps.guard.outputs.skip != 'true'
        run: python -m pipeline.research.r5_alert --github-output

      - name: Create R5-READY issue (one-time; alert only, dedup — NO analysis)
        if: steps.guard.outputs.skip != 'true' && steps.r5.outputs.emit == 'true'
        uses: actions/github-script@v7
        env:
          R5_TITLE: ${{ steps.r5.outputs.title }}
          R5_BODY: ${{ steps.r5.outputs.body }}
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: process.env.R5_TITLE, body: process.env.R5_BODY,
              labels: ['expansion-ready'],
            });
            // dedup: mark issued in the PRIVATE json (rides the cache; never committed).
            const fs = require('fs');
            const p = 'data/research_private/notes/news_density.json';
            const d = JSON.parse(fs.readFileSync(p, 'utf8'));
            d.r5 = d.r5 || {}; d.r5.alert_issued = true;
            fs.writeFileSync(p, JSON.stringify(d, null, 2));

      - name: "★ Leak gate — fail if any private file is tracked"
        if: steps.guard.outputs.skip != 'true'
        run: |
          tracked="$(git ls-files data/research_private data/papers_private)"
          if [ -n "$tracked" ]; then
            echo "::error::LEAK GATE FAILED — private files are tracked:"; echo "$tracked"; exit 1
          fi
          echo "leak gate ok — no private files tracked"

      - name: Commit ONLY the sanitized research_stats.json
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/research_stats.json
          staged="$(git diff --cached --name-only)"
          if [ -n "$staged" ] && [ "$staged" != "data/research_stats.json" ]; then
            echo "::error::unexpected staged files (aborting): $staged"; exit 1
          fi
          if git diff --cached --quiet; then
            echo "research stats unchanged — no commit"
          else
            git commit -m "data: nightly research stats [site refresh]"
            for a in 1 2 3; do
              if git push; then break; fi
              echo "push rejected, rebasing (attempt $a)"; git pull --rebase --autostash origin main || true
            done
          fi

      - name: Trim one-off artifacts before caching (keep cache lean)
        if: steps.guard.outputs.skip != 'true'
        run: |
          rm -f data/research_private/back1_staging/*.jsonl 2>/dev/null || true
          rm -f data/papers_private/*.snapshot* data/research_private/*.snapshot* 2>/dev/null || true
          find data/research_private/logs -type f -mtime +14 -delete 2>/dev/null || true

      - name: Save private state (Actions cache)
        if: steps.guard.outputs.skip != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: data/research_private
          key: ${{ env.CACHE_PREFIX }}${{ github.run_id }}

      - name: Heartbeat (AUTO-1)
        if: steps.guard.outputs.skip != 'true'
        run: python -m pipeline.research.health_check --stamp-success >> data/research_private/logs/ci-heartbeat.log 2>&1 || true

      - name: Report failure as issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `Research nightly failed: ${new Date().toISOString()}`,
              body: `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['research-nightly-failure'],
            });
